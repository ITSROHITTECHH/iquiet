<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iQuiet — Someone is always listening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #080a0e;
    --surface: #0e1117;
    --mist: rgba(160, 180, 220, 0.06);
    --glow: rgba(140, 160, 220, 0.12);
    --text-primary: #d8dde8;
    --text-muted: #5a6070;
    --text-soft: #8892a4;
    --accent: #a0b4d6;
    --accent-warm: #c4a882;
    --line: rgba(160, 180, 220, 0.08);
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #canvas-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.55;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    opacity: 0.035;
    pointer-events: none;
  }

  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    max-width: 680px;
    width: 100%;
  }

  .orb-wrap {
    position: relative;
    width: 90px;
    height: 90px;
    margin-bottom: 48px;
    animation: float 8s ease-in-out infinite;
  }

  .orb {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%,
      #d8dde8 0%,
      #a0b4d6 28%,
      #6878a0 60%,
      #2a3050 100%
    );
    box-shadow:
      0 0 40px rgba(140, 160, 220, 0.18),
      0 0 100px rgba(140, 160, 220, 0.08),
      inset -8px -6px 20px rgba(0,0,0,0.4);
    position: relative;
    z-index: 1;
  }

  .orb::after {
    content: '';
    position: absolute;
    top: 22px; left: 30px;
    width: 16px; height: 10px;
    border-radius: 50%;
    background: rgba(80, 90, 130, 0.35);
    filter: blur(3px);
    box-shadow: 18px 14px 0 8px rgba(80,90,130,0.2), -4px 22px 0 5px rgba(80,90,130,0.15);
  }

  .orb-halo {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 1px solid rgba(160,180,220,0.1);
    animation: halo-pulse 5s ease-in-out infinite;
  }

  .orb-halo-2 {
    position: absolute;
    inset: -36px;
    border-radius: 50%;
    border: 1px solid rgba(160,180,220,0.05);
    animation: halo-pulse 5s ease-in-out infinite 1s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  @keyframes halo-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(64px, 12vw, 96px);
    font-weight: 300;
    letter-spacing: 0.18em;
    line-height: 1;
    color: var(--text-primary);
    margin-bottom: 6px;
    opacity: 0;
    animation: rise 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    position: relative;
  }

  .wordmark .i-letter {
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-right: -0.04em;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    margin: 20px auto;
    opacity: 0;
    animation: rise 1s ease 0.7s forwards;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(17px, 2.8vw, 22px);
    color: var(--text-soft);
    letter-spacing: 0.04em;
    line-height: 1.55;
    margin-bottom: 8px;
    opacity: 0;
    animation: rise 1.2s ease 0.9s forwards;
  }

  .sub-tagline {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 52px;
    opacity: 0;
    animation: rise 1.2s ease 1.1s forwards;
  }

  .cta-wrap {
    opacity: 0;
    animation: rise 1.2s ease 1.3s forwards;
    position: relative;
  }

  .cta-btn {
    display: inline-block;
    padding: 16px 52px;
    background: transparent;
    border: 1px solid rgba(160, 180, 220, 0.22);
    border-radius: 60px;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s, color 0.4s;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 60px;
    background: radial-gradient(ellipse at center, rgba(140,160,220,0.14) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .cta-btn:hover {
    border-color: rgba(160, 180, 220, 0.5);
    color: #fff;
  }

  .cta-btn:hover::before {
    opacity: 1;
  }

  .cta-btn .btn-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transition: left 0.6s;
  }

  .cta-btn:hover .btn-shimmer {
    left: 160%;
  }

  .bottom-note {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: rise 1.2s ease 1.8s forwards;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bottom-note::before, .bottom-note::after {
    content: '';
    width: 28px; height: 1px;
    background: var(--text-muted);
    opacity: 0.4;
  }

  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(160, 180, 220, 0.5);
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-20vh) translateX(var(--dx)) scale(1); opacity: 0; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-height: 600px) {
    .orb-wrap { width: 60px; height: 60px; margin-bottom: 28px; }
    .orb { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="particles" id="particles"></div>

<div class="scene">
  <div class="orb-wrap">
    <div class="orb-halo-2"></div>
    <div class="orb-halo"></div>
    <div class="orb"></div>
  </div>

  <h1 class="wordmark"><span class="i-letter">i</span>Quiet</h1>

  <div class="divider"></div>

  <p class="tagline">Sometimes silence needs someone who listens.</p>
  <p class="sub-tagline">You are not alone tonight</p>

  <div class="cta-wrap">
    <a class="cta-btn" href="/chat.html">
      <span class="btn-shimmer"></span>
      Start Talking
    </a>
  </div>
</div>

<div class="bottom-note">Safe · Private · Always here</div>

<script>
  // Atmospheric nebula canvas
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const orbs = [
    { x: 0.18, y: 0.3,  r: 0.38, c: [80, 100, 160],  speed: 0.0004 },
    { x: 0.75, y: 0.65, r: 0.32, c: [100, 80, 140],   speed: 0.0003 },
    { x: 0.55, y: 0.15, r: 0.22, c: [60, 90, 130],    speed: 0.0005 },
    { x: 0.3,  y: 0.8,  r: 0.18, c: [120, 100, 160],  speed: 0.0006 },
  ];

  let t = 0;
  function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#080a0e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const W = canvas.width, H = canvas.height;

    orbs.forEach((o, i) => {
      const ox = (o.x + Math.sin(t * o.speed * 1000 + i) * 0.06) * W;
      const oy = (o.y + Math.cos(t * o.speed * 800  + i) * 0.06) * H;
      const r  = o.r * Math.min(W, H);

      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
      g.addColorStop(0,   `rgba(${o.c[0]}, ${o.c[1]}, ${o.c[2]}, 0.09)`);
      g.addColorStop(0.4, `rgba(${o.c[0]}, ${o.c[1]}, ${o.c[2]}, 0.04)`);
      g.addColorStop(1,   `rgba(${o.c[0]}, ${o.c[1]}, ${o.c[2]}, 0)`);

      ctx.beginPath();
      ctx.arc(ox, oy, r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });

    t += 16;
    requestAnimationFrame(drawBg);
  }
  drawBg();

  // Floating particles
  const particleContainer = document.getElementById('particles');
  const PARTICLE_COUNT = 18;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size  = Math.random() * 2 + 0.8;
    const left  = Math.random() * 100;
    const dur   = Math.random() * 20 + 18;
    const delay = Math.random() * 20;
    const dx    = (Math.random() - 0.5) * 120;

    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${left}%;
      bottom: -10px;
      --dx: ${dx}px;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
      opacity: 0;
    `;
    particleContainer.appendChild(p);
  }

  // Mouse parallax on orb
  const orbWrap = document.querySelector('.orb-wrap');
  document.addEventListener('mousemove', e => {
    const mx = (e.clientX / window.innerWidth  - 0.5) * 12;
    const my = (e.clientY / window.innerHeight - 0.5) * 10;
    orbWrap.style.transform = `translate(${mx}px, ${my}px)`;
  });
</script>

</body>
</html>
